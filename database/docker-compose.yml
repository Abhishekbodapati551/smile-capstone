services:
  minio:
    image: minio/minio
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./storage-data:/data
    command: server /data --console-address ":9001"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: smile_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  backend:
    image: node:18
    working_dir: /app
    volumes:
      - ../backend:/app
      - ../frontend/web:/frontend/web
    ports:
      - "5000:5000"
    command: sh -c "npm install && node server.js"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/smile_db

  jenkins:
    image: jenkins/jenkins:lts
    user: root
    ports:
      - "8180:8080"
      - "50001:50000"
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
