services:
  # 1. Video Storage (MinIO)
  minio:
    image: minio/minio
    container_name: smile-storage
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./storage-data:/data
    command: server /data --console-address ":9001"

  # 2. Structured Database (Postgres)
  db:
    image: postgres:15
    container_name: smile-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: smile_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  # 3. Backend API (Node.js)
  backend-api:
    image: node:18
    container_name: smile-backend
    working_dir: /app
    volumes:
      - ../backend:/app
    ports:
      - "5000:5000"
    command: sh -c "npm install && node server.js"
    depends_on:
      - db

  # 4. Automation (Jenkins)
  jenkins:
    image: jenkins/jenkins:lts
    container_name: smile-jenkins
    user: root
    ports:
      - "8180:8080"
      - "50001:50000"
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
