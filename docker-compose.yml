services:
  minio:
    image: minio/minio
    container_name: smile-storage
    ports:
      - "9100:9000"     # API port (New: 9100)
      - "9101:9001"     # Console port (New: 9101)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./storage-data:/data
    command: server /data --console-address ":9001"

  jenkins:
    image: jenkins/jenkins:lts
    container_name: smile-jenkins
    user: root
    ports:
      - "8180:8080"     # Web UI port (New: 8180)
      - "50001:50000"   # Agent port (New: 50001)
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
