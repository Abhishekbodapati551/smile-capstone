services:
  minio:
    image: minio/minio
    container_name: smile-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./storage-data:/data
    command: server /data --console-address ":9001"

  jenkins:
    image: jenkins/jenkins:lts
    container_name: smile-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
